<!DOCTYPE html> <!-- Indica que este documento utiliza HTML5 -->

<html lang="es"> <!-- Comienza la página y especifica que está en español -->

<head> <!-- Inicia la sección de configuración -->

<meta charset="UTF-8"> <!-- Permite mostrar correctamente caracteres como la ñ y las tildes -->

<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace que la página se adapte a celulares y tabletas -->

<title>Mi Primera Página Web</title> <!-- Nombre que aparece en la pestaña del navegador -->

<style> /* Aquí comienza el código CSS */

/* Estilos para toda la página */
body{

    font-family: Arial, sans-serif; /* Tipo de letra */

    background-color:black; /* Color de respaldo si la imagen no carga */

    background-image:url("bts.jpg"); /* Imagen de fondo */

    background-size:cover; /* La imagen ocupa toda la pantalla */

    background-position:center; /* Centra la imagen */

    background-repeat:no-repeat; /* Evita que la imagen se repita */

    background-attachment:fixed; /* La imagen permanece fija al hacer scroll */

    margin:0; /* Elimina los márgenes del navegador */

    min-height:100vh; /* Hace que el fondo ocupe toda la altura de la pantalla */

    display:flex; /* Activa Flexbox para centrar el contenido */

    justify-content:center; /* Centra horizontalmente */

    align-items:center; /* Centra verticalmente */

}

/* Caja donde estará el contenido */
.tarjeta{

    width:500px; /* Ancho de la tarjeta */

    background:rgba(255,255,255,0.85); /* Fondo blanco semitransparente */

    padding:30px; /* Espacio interno */

    border-radius:15px; /* Esquinas redondeadas */

    box-shadow:0px 0px 20px black; /* Agrega una sombra */

    text-align:center; /* Centra el contenido */

}

/* Estilo del título principal */
h1{

    color:#7B1FA2; /* Color morado */

}

/* Estilo del subtítulo */
h2{

    color:#512DA8; /* Morado más oscuro */

}

/* Estilo de la lista */
ul{

    text-align:left; /* Alinea la lista hacia la izquierda */

}

/* Estilo del botón */
button{

    background:#7B1FA2; /* Fondo morado */

    color:white; /* Letras blancas */

    border:none; /* Sin borde */

    padding:12px 20px; /* Espacio interno */

    border-radius:8px; /* Esquinas redondeadas */

    cursor:pointer; /* Cambia el cursor por una mano */

    font-size:16px; /* Tamaño de la letra */

}

/* Cambia el color cuando el mouse pasa por encima */
button:hover{

    background:#512DA8;

}

</style> <!-- Finaliza el CSS -->

</head> <!-- Finaliza la configuración -->

<body> <!-- Comienza el contenido visible -->

<div class="tarjeta"> <!-- Caja principal -->

<img src="bts.jpg" width="150" alt="Logo BTS"> <!-- Muestra el logo de BTS -->

<h1>Mi Primera Página Web</h1> <!-- Título principal -->

<p> <!-- Comienza un párrafo -->

Hola, mi nombre es <strong>Sara Sofía Cortés Rodríguez</strong>.<br>

Estoy aprendiendo HTML en el colegio CEDID San Pablo.

</p> <!-- Finaliza el párrafo -->

<h2>Mis materias favoritas</h2> <!-- Subtítulo -->

<ul> <!-- Inicia una lista -->

<li>🎵 Música</li> <!-- Primer elemento -->

<li>⚽ Educación Física</li> <!-- Segundo elemento -->

<li>🧬 Biología</li> <!-- Tercer elemento -->

</ul> <!-- Finaliza la lista -->

<button onclick="saludar()"> <!-- Botón que ejecuta una función -->

Haz clic aquí

</button> <!-- Finaliza el botón -->

</div> <!-- Finaliza la tarjeta -->

<script> // Comienza JavaScript

/* Se crea una función llamada saludar */
function saludar(){

    /* Muestra un mensaje cuando el usuario hace clic */
    alert("¡Hola! Gracias por visitar mi página. 💜");

}

/* Finaliza la función */

</script> <!-- Finaliza JavaScript -->

</body> <!-- Finaliza el contenido visible -->

</html> <!-- Finaliza el documento HTML -->
