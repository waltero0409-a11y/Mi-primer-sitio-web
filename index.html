<!DOCTYPE html> <!-- Indica que este documento utiliza HTML5 -->

<html lang="es"> <!-- Comienza la página y especifica que está en español -->

<head> <!-- Inicia la sección de configuración -->

<meta charset="UTF-8"> <!-- Permite mostrar correctamente caracteres especiales como la ñ y las tildes -->

<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace que la página sea adaptable a celulares y tabletas -->

<title>Mi Primera Página Web</title> <!-- Nombre que aparece en la pestaña del navegador -->

<style> /* Aquí comienza el código CSS */

/* Estilos para toda la página */
body{

    font-family: Arial, sans-serif; /* Tipo de letra */

    background-color:black; /* Color de respaldo */

    background-image:url("musica.jpg"); /* Imagen de fondo */

    background-size:cover; /* La imagen ocupa toda la pantalla */

    background-position:center; /* Centra la imagen */

    background-repeat:no-repeat; /* Evita que la imagen se repita */

    background-attachment:fixed; /* Mantiene fija la imagen */

    margin:0; /* Elimina los márgenes */

    min-height:100vh; /* La página ocupa toda la altura */

    display:flex; /* Activa Flexbox */

    justify-content:center; /* Centra horizontalmente */

    align-items:center; /* Centra verticalmente */

}

/* Caja principal */
.tarjeta{

    width:500px; /* Ancho */

    background:rgba(255,255,255,0.85); /* Fondo blanco transparente */

    padding:30px; /* Espacio interno */

    border-radius:15px; /* Esquinas redondeadas */

    box-shadow:0 0 20px black; /* Sombra */

    text-align:center; /* Centra el contenido */

}

/* Color del título */
h1{

    color:#7B1FA2;

}

/* Color del subtítulo */
h2{

    color:#512DA8;

}

/* Lista */
ul{

    text-align:left;

}

/* Botón */
button{

    background:#7B1FA2;

    color:white;

    border:none;

    padding:12px 20px;

    border-radius:8px;

    cursor:pointer;

    font-size:16px;

}

/* Cambia el color al pasar el mouse */
button:hover{

    background:#512DA8;

}

/* Estilo del mensaje */
#mensaje{

    margin-top:20px;

    font-size:22px;

    color:#7B1FA2;

    font-weight:bold;

}

</style> <!-- Finaliza el CSS -->

</head> <!-- Finaliza la configuración -->

<body> <!-- Comienza el contenido visible -->

<div class="tarjeta"> <!-- Caja principal -->

<img src="musica.jpg" width="150" alt="Imagen de música"> <!-- Imagen -->

<h1>Mi Primera Página Web</h1> <!-- Título -->

<p> <!-- Comienza el párrafo -->

Hola, mi nombre es <strong>Sara Sofía Cortés Rodríguez</strong>.<br>

Estoy aprendiendo HTML en el colegio CEDID San Pablo.

</p> <!-- Finaliza el párrafo -->

<h2>Mis materias favoritas</h2> <!-- Subtítulo -->

<ul> <!-- Inicia la lista -->

<li>🎵 Música</li> <!-- Primer elemento -->

<li>⚽ Educación Física</li> <!-- Segundo elemento -->

<li>🧬 Biología</li> <!-- Tercer elemento -->

</ul> <!-- Finaliza la lista -->

<button onclick="saludar()"> <!-- Cuando se hace clic ejecuta la función saludar -->

Haz clic aquí

</button> <!-- Finaliza el botón -->

<p id="mensaje"></p> <!-- Aquí aparecerá el mensaje -->

</div> <!-- Finaliza la tarjeta -->

<!-- Biblioteca que permite crear el efecto de confeti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script> // Comienza JavaScript

/* Función que se ejecuta al hacer clic */
function saludar(){

    /* Escribe el mensaje dentro de la página */
    document.getElementById("mensaje").innerHTML =
    "💜 ¡Gracias por visitar mi página! 💜";

    /* Tiempo que durarán los confetis */
    var duracion = 4 * 1000;

    /* Calcula cuándo deben terminar */
    var fin = Date.now() + duracion;

    /* Función que lanza confetis continuamente */
    (function lanzar(){

        /* Confeti desde la izquierda */
        confetti({

            particleCount:4,

            angle:60,

            spread:70,

            origin:{x:0}

        });

        /* Confeti desde la derecha */
        confetti({

            particleCount:4,

            angle:120,

            spread:70,

            origin:{x:1}

        });

        /* Repite mientras no termine el tiempo */
        if(Date.now() < fin){

            requestAnimationFrame(lanzar);

        }

    })();

}

</script> <!-- Finaliza JavaScript -->

</body> <!-- Finaliza el contenido -->

</html> <!-- Finaliza el documento HTML -->
